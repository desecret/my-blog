<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Short URL 生成器</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: #fffdfa;
      --ink: #1d1a17;
      --muted: #6f6558;
      --line: #e8dfd2;
      --brand: #1f8f6a;
      --brand-weak: #e8f6ef;
      --danger: #bc3e32;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 12%, #d9f4e5 0, transparent 28%),
        radial-gradient(circle at 88% 84%, #fde6d8 0, transparent 22%),
        linear-gradient(180deg, #f7f1e9 0%, #f2ede6 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .panel {
      width: min(880px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 24px 40px rgba(36, 29, 22, 0.08);
      overflow: hidden;
    }

    .head {
      padding: 26px 28px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(95deg, #fdf7f0 0%, #f5fbf7 100%);
    }

    .head h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.01em;
    }

    .head p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .body {
      padding: 24px 28px 28px;
      display: grid;
      gap: 14px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      font-size: 14px;
      line-height: 1.6;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    textarea:focus {
      border-color: #8dcfb8;
      box-shadow: 0 0 0 4px rgba(31, 143, 106, 0.12);
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button {
      border: none;
      border-radius: 999px;
      background: var(--brand);
      color: white;
      font-size: 14px;
      font-weight: 700;
      padding: 11px 18px;
      cursor: pointer;
    }

    button[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
    }

    .status.err { color: var(--danger); }
    .status.ok { color: var(--brand); }

    .out {
      border: 1px dashed #b8d9ca;
      background: var(--brand-weak);
      border-radius: 12px;
      padding: 12px;
      display: none;
      gap: 6px;
    }

    .out.show { display: grid; }

    .out .k {
      font-size: 12px;
      color: var(--muted);
    }

    .out a {
      color: #0f5d43;
      font-weight: 700;
      word-break: break-all;
    }

    .helper {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <main class="panel">
    <section class="head">
      <h1>Short URL 生成器</h1>
      <p>输入你想跳转的链接，系统会为你生成可用的小红书短链。</p>
    </section>
    <section class="body">
      <label for="applinkInput">applink value</label>
      <textarea id="applinkInput" placeholder="https://wx.cdgoufang.com/v/f/oO3LcT7R"></textarea>

      <div class="row">
        <button id="generateBtn">生成 short_url</button>
      </div>

      <div id="status" class="status"></div>

      <div id="output" class="out">
        <div class="k">short_url</div>
        <a id="shortUrl" href="#" target="_blank" rel="noopener noreferrer"></a>
      </div>

      <div class="helper">
        说明：页面调用同服务下的 API <code>/api/short-url</code>，需要本地 cookie 文件可用。
      </div>
    </section>
  </main>

  <script>
    const input = document.getElementById('applinkInput');
    const btn = document.getElementById('generateBtn');
    const status = document.getElementById('status');
    const output = document.getElementById('output');
    const shortUrl = document.getElementById('shortUrl');

    async function generateShortUrl() {
      const applink = input.value.trim();
      if (!applink) {
        status.className = 'status err';
        status.textContent = '请先输入 applink value';
        output.classList.remove('show');
        return;
      }

      btn.disabled = true;
      status.className = 'status';
      status.textContent = '正在生成，请稍候...';

      try {
        const resp = await fetch('/api/short-url', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ applink })
        });
        const data = await resp.json();

        if (!resp.ok || data.code !== 0) {
          throw new Error(data.msg || '生成失败');
        }

        const url = data.data.short_url;
        shortUrl.href = url;
        shortUrl.textContent = url;
        output.classList.add('show');

        status.className = 'status ok';
        status.textContent = '生成成功';
      } catch (err) {
        status.className = 'status err';
        status.textContent = `失败：${err.message || err}`;
        output.classList.remove('show');
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener('click', generateShortUrl);
  </script>
</body>
</html>
