<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>跳转中...</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --panel: #ffffff;
      --ink: #1f1a14;
      --muted: #736a5e;
      --brand: #2d8f73;
      --line: #e7dfd1;
      --err: #b9412f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 14% 18%, #dff3ea 0, transparent 26%),
        radial-gradient(circle at 82% 76%, #fee9dc 0, transparent 22%),
        var(--bg);
      padding: 20px;
    }

    .card {
      width: min(720px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 16px 34px rgba(30, 23, 17, 0.08);
    }

    h1 {
      margin: 0;
      font-size: 26px;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .target {
      margin-top: 14px;
      font-size: 13px;
      background: #f8fbfa;
      border: 1px dashed #cde2d9;
      border-radius: 10px;
      padding: 10px;
      word-break: break-all;
    }

    .err {
      margin-top: 14px;
      color: var(--err);
      font-size: 14px;
      font-weight: 600;
      display: none;
    }

    .btn {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--brand);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      padding: 10px 18px;
    }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1 id="title">正在为你跳转</h1>
    <p id="desc"><span id="countdown">1</span> 秒后自动前往目标链接。</p>
    <div id="target" class="target"></div>
    <a id="jumpBtn" class="btn" href="#" rel="nofollow noopener">立即跳转</a>
    <div class="hint">如果没有自动跳转，请点击上方按钮。</div>
    <div id="err" class="err"></div>
  </main>

  <script>
    (function () {
      var CONFIG_URL = "./redirect-config.json";
      var LOCAL_FALLBACK = {
        delaySeconds: 1,
        defaultTarget: "https://wx.cdgoufang.com/v/f/oO3LcT7R",
        targetPool: ["https://wx.cdgoufang.com/v/f/oO3LcT7R"],
        keyMap: {
          a: "https://wx.cdgoufang.com/v/f/oO3LcT7R"
        }
      };

      var titleEl = document.getElementById("title");
      var descEl = document.getElementById("desc");
      var targetEl = document.getElementById("target");
      var btnEl = document.getElementById("jumpBtn");
      var errEl = document.getElementById("err");
      var countdownEl = document.getElementById("countdown");

      function isAllowed(url) {
        return /^(https?:|xhsdiscover:)/i.test(url);
      }

      function showError(message) {
        titleEl.textContent = "无法跳转";
        descEl.style.display = "none";
        targetEl.style.display = "none";
        btnEl.style.display = "none";
        errEl.style.display = "block";
        errEl.textContent = message;
      }

      function pickTarget(config) {
        var params = new URLSearchParams(window.location.search);
        var key = (params.get("k") || "").trim();
        var keyMap = config.keyMap || {};
        var mapped = keyMap[key];
        if (typeof mapped === "string" && mapped.trim() !== "") {
          return mapped.trim();
        }

        var pool = Array.isArray(config.targetPool) ? config.targetPool : [];
        var candidates = pool.filter(function (item) {
          return typeof item === "string" && item.trim() !== "";
        }).map(function (item) { return item.trim(); });

        if (candidates.length > 0) {
          return candidates[Math.floor(Math.random() * candidates.length)];
        }

        var fallback = (config.defaultTarget || "").trim();
        return fallback;
      }

      function startRedirect(config) {
        var target = pickTarget(config);
        if (!target) {
          showError("未配置可用跳转链接");
          return;
        }

        if (!isAllowed(target)) {
          showError("目标链接协议不被允许");
          return;
        }

        var delay = Number(config.delaySeconds);
        if (!Number.isFinite(delay) || delay < 0) {
          delay = 1;
        }
        delay = Math.floor(delay);

        targetEl.textContent = target;
        btnEl.href = target;

        function tick(left) {
          countdownEl.textContent = String(left);
          if (left <= 0) {
            window.location.href = target;
            return;
          }
          setTimeout(function () {
            tick(left - 1);
          }, 1000);
        }

        tick(delay);
      }

      fetch(CONFIG_URL, { cache: "no-store" })
        .then(function (resp) {
          if (!resp.ok) {
            throw new Error("load config failed");
          }
          return resp.json();
        })
        .then(function (remoteConfig) {
          startRedirect(Object.assign({}, LOCAL_FALLBACK, remoteConfig || {}));
        })
        .catch(function () {
          startRedirect(LOCAL_FALLBACK);
        });
    })();
  </script>
</body>
</html>
